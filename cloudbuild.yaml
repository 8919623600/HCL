steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/application-service:latest', '.']

images:
  - 'gcr.io/$PROJECT_ID/application-service:latest'

# Get GKE credentials
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - container
      - clusters
      - get-credentials
      - my-gke-cluster
      - --region
      - us-central1

  # Deploy to GKE
  - name: 'gcr.io/cloud-builders/kubectl'
    args: ['apply', '-f', 'k8s/']
    env:
      - 'CLOUDSDK_COMPUTE_REGION=us-central1'
      - 'CLOUDSDK_CONTAINER_CLUSTER=my-gke-cluster'

images:
  - 'gcr.io/$PROJECT_ID/application-service:latest'

options:
  logging: CLOUD_LOGGING_ONLY
